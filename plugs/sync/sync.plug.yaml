name: sync
functions:
  # Commands
  syncSpaceCommand:
    path: "./sync.ts:syncSpaceCommand"
    command:
      name: "Sync: Space"
      menu:
        location: space
        group: "1_sync"
        order: 1
        label: "Sync Space"

  syncFileCommand:
    path: "./sync.ts:syncFileCommand"
    command:
      name: "Sync: File"
      menu:
        location: space
        group: "1_sync"
        order: 2
        label: "Sync File"

  showConflictsCommand:
    path: "./sync.ts:showConflictsCommand"
    command:
      name: "Sync: Show Conflicts"
      menu:
        location: space
        group: "1_sync"
        order: 3
        label: "Show Conflicts"

  spaceSyncComplete:
    path: "./sync.ts:spaceSyncComplete"
    events:
      - "service-worker:space-sync-complete"
  fileSyncComplete:
    path: "./sync.ts:fileSyncComplete"
    events:
      - "service-worker:file-sync-complete"
  updateSyncStatus:
    path: "./sync.ts:updateSyncStatus"
    events:
      - "service-worker:sync-status"
  reportSyncConflict:
    path: "./sync.ts:reportSyncConflict"
    events:
      - "service-worker:sync-conflict"
