services:
  traefik:
    image: traefik:v3
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--entryPoints.websecure.address=:443"
    ports:
      # HTTPS only, on host port 8443 to avoid conflicts with whatever already
      # uses 80/443 on Windows (IIS, http.sys, etc.).
      # Access the app at https://localhost:8443
      - "8443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  silverbullet:
    # Build from this repo. To use the published image instead, replace
    # `build: .` with:  image: ghcr.io/silverbulletmd/silverbullet
    build: .
    restart: unless-stopped
    environment:
      # Required: credentials in user:password form (set in .env).
      # SB_USERS (plural) accepts multiple comma-separated users; SB_USER
      # (singular) is one user only and is NOT comma-split.
      # Without this, anyone reaching the server can read/edit your space.
      - SB_USERS=${SB_USERS:?Set SB_USERS in .env, e.g. SB_USERS=antoine:change-me,bob:change-me}
      # Note: the image already sets SB_HOSTNAME=0.0.0.0 (the -L0.0.0.0
      # equivalent) so it accepts connections from Traefik. Port 3000 is
      # intentionally NOT published on the host: only Traefik (HTTPS) reaches it.
    volumes:
      - C:\Tools\wiki:/space
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.silverbullet.rule=PathPrefix(`/`)"
      - "traefik.http.routers.silverbullet.entrypoints=websecure"
      # No domain/ACME configured, so Traefik serves its built-in
      # self-signed certificate. Browsers will warn once; accept it.
      - "traefik.http.routers.silverbullet.tls=true"
      - "traefik.http.services.silverbullet.loadbalancer.server.port=3000"

volumes:
  space:
